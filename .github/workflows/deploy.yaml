name: dockertest
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  test: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: build docker image
        run: docker build -t studentportal .
      - name: run container
        run: docker run -d --name test2 -p 5000:80 studentportal
      - name: create new container
        run: docker run -d --name test3 -p 50001:80 studentportal
      - name: stop container test2 for testing
        run: docker stop test2 
      - name: list docker images
        run: docker images
      - name: check running container details
        run: |
          docker logs test2 
          docker ps
          docker ps -a

