name: dockertest
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  test: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: build docker image
        run: docker build -t studentportal .
      - name: run container
        run: |
          docker run -d --name test2 -p 5000:80 studentportal
          docker run -d --name test3 -p 5001:80 studentportal
          docker run -d --name test4 -p 5002:80 studentportal
          docker run -d --name test5 -p 5003:80 studentportal
          docker run -d --name test6 -p 5004:80 studentportal
          docker run -d --name test7 -p 5005:80 studentportal
          docker images
      - name: list containers
        run: docker ps
          

      