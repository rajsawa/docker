name: test docker
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: docker configuration
        run:  |
          docker build -t testimage .
          docker run -d --name container1 -p 5000:80 testimage
          docker run -d --name container2 -p 5001:80 testimage
          docker ps 
          docker ps -a 
      - name: stop container1
        run:  |
          docker stop container2
          docker ps -a